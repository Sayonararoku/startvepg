name: Generar EPG StarTV

on:
  schedule:
    # Cada 12 horas (06:00 y 18:00 UTC = 00:00 y 12:00 hora de Mexico)
    - cron: "0 6,18 * * *"
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

# Evita ejecuciones solapadas; no cancela la que ya esta publicando.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Generar epg.xml
        env:
          # El token se obtiene solo (sesion de invitado). Estos secrets son OPCIONALES,
          # solo por si algun dia quieres forzar un token/appId manual.
          STARTV_TOKEN: ${{ secrets.STARTV_TOKEN }}
          STARTV_APP_ID: ${{ secrets.STARTV_APP_ID }}
          EPG_DAYS: "7"
          EPG_OUTPUT: public/epg.xml
        run: python generate_epg.py

      - name: Crear index.html
        run: |
          {
            echo '<!doctype html><meta charset="utf-8"><title>StarTV EPG</title>'
            echo '<h1>StarTV EPG</h1>'
            echo "<p>Generado: $(date -u '+%Y-%m-%d %H:%M UTC')</p>"
            echo '<ul>'
            echo '<li><a href="epg.xml">epg.xml</a></li>'
            echo '<li><a href="epg.xml.gz">epg.xml.gz</a></li>'
            echo '</ul>'
          } > public/index.html

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
